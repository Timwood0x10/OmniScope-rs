# OmniScope-rs Release Pipeline
# Builds release binaries for Linux + macOS on tag push, attaches to GitHub Release.
# Apache 2.0 License

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Resolve the tag/ref both for tag-push and manual dispatch.
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && matrix.cross != true
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev gcc-aarch64-linux-gnu

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zstd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # On non-native targets, the rustc-wrapper + linker config in
      # .cargo/config.toml (mold for x86_64-linux only) doesn't apply,
      # but we still need to point the cross-linker at the right gcc.
      - name: Configure cross-linker (aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'

          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        env:
          CARGO_BUILD_JOBS: "4"
        run: cargo build --release --locked --target ${{ matrix.target }} -p omniscope-cli

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          name="omniscope-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/omniscope" "dist/${name}/omniscope"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          # SHA-256 checksum
          if command -v shasum >/dev/null; then
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          else
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.name }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.checksum }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.sha256
