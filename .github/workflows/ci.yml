# OmniScope-rs CI/CD Pipeline
# Apache 2.0 License

name: CI/CD

on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # llvm-sys 221 is used by omniscope-ir when the llvm-backend feature is on.
  # Linux runners install llvm-22-dev under /usr/lib/llvm-22 (matches llvm-sys major version).
  LLVM_SYS_221_PREFIX: /usr/lib/llvm-22

jobs:
  # Job 1: Format Check
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Job 2: Clippy Lints
  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold wget
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y llvm-22-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Job 3: Test Suite
  test:
    name: Test Suite (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        exclude:
          # Reduce CI load: only run beta on Linux
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold wget
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y llvm-22-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zstd llvm@22
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm@22)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      # Windows has no easy llvm-22-dev; build/test without llvm-backend feature.
      - name: Run tests (Linux / macOS, all features)
        if: runner.os != 'Windows'
        run: cargo test --workspace --all-features --verbose

      - name: Run tests (Windows, default features)
        if: runner.os == 'Windows'
        run: cargo test --workspace --verbose

  # Job 4: Documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold wget
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y llvm-22-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --workspace --no-deps

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc

  # Job 5: Security Audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # Job 6: Miri Check (for unsafe code)
  miri:
    name: Miri Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: miri

      - name: Setup Miri
        run: cargo miri setup
        env:
          RUSTUP_TOOLCHAIN: nightly

      - name: Run Miri tests
        run: cargo miri test
        continue-on-error: true
        env:
          RUSTUP_TOOLCHAIN: nightly

  # Job 7: Benchmark compile check
  bench:
    name: Benchmark Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold wget
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y llvm-22-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build benchmarks (no run)
        run: cargo bench --no-run

  # Job 8: FFI Boundary Informational Check
  # Non-blocking informational job — reports FFI boundary issues as SARIF
  # and adds a summary note. Does NOT block the build.
  ffi-boundary-check:
    name: FFI Boundary Check
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold wget
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y llvm-22-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build omniscope CLI
        run: cargo build --release -p omniscope-cli

      - name: Analyze C++ FFI IR files (SARIF output)
        continue-on-error: true
        run: |
          mkdir -p sarif-output
          for ir_file in tests/integration/cpp_fft.ll tests/integration/cpp_hash.ll tests/integration/c_ffi_bugs.ll tests/integration/c_fft_c_bridge.ll; do
            if [ -f "$ir_file" ]; then
              name=$(basename "$ir_file" .ll)
              echo "::group::Analyzing $ir_file"
              ./target/release/omniscope analyze "$ir_file" -f sarif -o "sarif-output/${name}.sarif" || true
              echo "::endgroup::"
            fi
          done

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: ffi-boundary-sarif
          path: sarif-output/

      - name: Summarize FFI boundary issues found
        continue-on-error: true
        shell: bash
        run: |
          echo "## FFI Boundary Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for sarif in sarif-output/*.sarif; do
            if [ -f "$sarif" ]; then
              name=$(basename "$sarif" .sarif)
              issues=$(python3 -c "import json, sys; data=json.load(open('$sarif')); total=sum(len(run.get('results',[])) for run in data.get('runs',[])); print(total)" 2>/dev/null || echo "parse-error")
              echo "- **$name.ll**: $issues issues" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> This is an informational check — it does not block the build." >> $GITHUB_STEP_SUMMARY

  # Job 9: Benchmark Suite
  # Runs all registered benchmarks and saves results as artifacts.
  benchmark:
    name: Benchmark Suite
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev mold wget
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 22
          sudo apt-get install -y llvm-22-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run all benchmarks
        continue-on-error: true
        run: cargo bench --workspace --verbose 2>&1 | tee benchmark-output.log

      - name: Save benchmark results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion/
            benchmark-output.log
