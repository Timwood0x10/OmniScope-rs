name: Feature Request
description: Request a new feature for OmniScope-rs
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        Please fill out all required fields to help us understand your request.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when [...] because the analyzer doesn't support [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen
      placeholder: "The analyzer should be able to detect [...] by implementing [...]"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered
      placeholder: "I considered using tool X, but it doesn't support language Y"

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this feature affect?
      options:
        - Core Infrastructure (Layer 1)
        - IR Abstraction (Layer 2)
        - Dataflow Engine (Layer 3)
        - Semantic Analysis (Layer 4)
        - Analysis Passes (Layer 5)
        - Pipeline Orchestration (Layer 6)
        - CLI & Output (Layer 7)
        - Build System
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical (Blocking my use case)
        - High (Would significantly improve my workflow)
        - Medium (Nice to have)
        - Low (Minor improvement)
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What type of feature is this?
      options:
        - New Analysis Pass
        - Language Support
        - Performance Optimization
        - Usability Improvement
        - API Enhancement
        - Documentation
        - Tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Describe specific use cases for this feature
      placeholder: |
        1. When analyzing FFI boundaries in Rust/C interop
        2. When checking for memory safety in unsafe blocks
        3. When auditing third-party library usage

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Provide examples of how this feature would be used
      placeholder: |
        ```bash
        # Example command-line usage
        omniscope analyze --pass=ffi-check input.rs
        ```

        ```rust
        // Example API usage
        let result = analyzer.run_ffi_check(source)?;
        ```

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: If you have ideas about how to implement this feature, share them here
      placeholder: "This could be implemented by extending the IR layer to support..."

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant papers, tools, or discussions
      placeholder: |
        - Similar feature in tool X: [link]
        - Relevant paper: [link]
        - Related issue: #123

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checks
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all required information
          required: true
        - label: This feature aligns with the project's goals
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here
