name: Bug Report
description: Report a bug in OmniScope-rs
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please fill out all required fields to help us resolve the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "When I run the analyzer on file X, it crashes with error Y"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Clone the repository
        2. Build with `make release`
        3. Run `./omniscope analyze test.c`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
      placeholder: "The analyzer should complete successfully and output analysis results"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened
      placeholder: "The analyzer crashed with a segmentation fault"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant log output (use code blocks)
      placeholder: |
        ```
        error: segmentation fault at address 0x0
        stack trace: ...
        ```
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Core Infrastructure (Layer 1)
        - IR Abstraction (Layer 2)
        - Dataflow Engine (Layer 3)
        - Semantic Analysis (Layer 4)
        - Analysis Passes (Layer 5)
        - Pipeline Orchestration (Layer 6)
        - CLI & Output (Layer 7)
        - Build System
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (System crash, data loss)
        - High (Major functionality broken)
        - Medium (Functionality impaired)
        - Low (Minor issue, cosmetic)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OmniScope-rs Version
      description: What version of OmniScope-rs are you using?
      placeholder: "0.1.0 or commit hash"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details
      placeholder: |
        - OS: Ubuntu 22.04
        - Rust: rustc 1.75.0
        - LLVM: 17.0.0
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproducible Example
      description: If applicable, provide a minimal code example that triggers the bug
      placeholder: |
        ```c
        // test.c
        int main() {
            int* ptr = NULL;
            *ptr = 42; // null pointer dereference
            return 0;
        }
        ```
      render: c

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checks
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all required information
          required: true
        - label: I have tested with the latest version
          required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: "This might be related to issue #123"
